#     on_connect: 
#       then:
#         - lambda: "id(binary_sensor_${blueriiot_id_prefix}_connected).publish_state(true);"
#         - delay: 2s
#         - button.press: button_${blueriiot_id_prefix}_doreading
#     on_disconnect: [lambda: "id(binary_sensor_${blueriiot_id_prefix}_connected).publish_state(false);"]
binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO5
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp on/off"
    on_press:
      then:
        - switch.toggle: RL1 
  - platform: gpio
    pin: 
      number: GPIO4
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp low speed"
    on_press:
      then:
        - switch.turn_on: RL2
        - switch.turn_off: RL3
        - switch.turn_off: RL4
  - platform: gpio
    pin: 
      number: GPIO40
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp med speed"
    on_press:
      then:
        - switch.turn_on: RL3
        - switch.turn_off: RL2
        - switch.turn_off: RL4
  - platform: gpio
    pin: 
      number: GPIO39
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp high speed"
    on_press:
      then:
        - switch.turn_on: RL4
        - switch.turn_off: RL2
        - switch.turn_off: RL3
  - platform: gpio
    pin: 
      number: GPIO12
      inverted: True
      mode: 
        input: true
        pulldown: True
    name: "zwembad flow sensor"
## Blue Connect    
#   - platform: template
#     id: binary_sensor_${blueriiot_id_prefix}_connected
#     name: ${blueriiot_name_prefix} Status
#     device_class: connectivity
#     entity_category: diagnostic
#Switches and relays
switch:
  - platform: gpio
    pin: GPIO1   
    name: "Pump Toggle" 
    id: RL1
    on_turn_on:
    - output.turn_on: lb1
    on_turn_off: 
    - output.turn_off: lb1
    - output.turn_off: lb2
    - output.turn_off: lb3
    - output.turn_off: lb4
  - platform: gpio 
    pin: GPIO2  
    name: "Pump High"
    id: RL2
    on_turn_on:
    - output.turn_on: lb2
    - output.turn_off: lb3
    - output.turn_off: lb4
  - platform: gpio 
    pin: GPIO41  
    name: "Pump Mid" 
    id: RL3
    on_turn_on:
    - output.turn_on: lb3
    - output.turn_off: lb2
    - output.turn_off: lb4
  - platform: gpio
    pin: GPIO42   
    name: "Pump Low" 
    id: RL4
    on_turn_on:
    - output.turn_on: lb4
    - output.turn_off: lb2
    - output.turn_off: lb3
#- platform: gpio 
#  pin: GPIO45  #D6
#  name: "Relay 5"
#  id: RL5
#- platform: gpio 
#  pin: GPIO46  #D5
#  name: "Relay6" 
#  id: RL6  
  - platform: template
    name: "switch_buzzer"
    optimistic: true
    turn_on_action:
      - output.turn_on: buzzer
#in here we set the frequency, but first we had to turn the buzzer on as stated in https://esphome.io/components/output/ledc
      - output.ledc.set_frequency:
          id: buzzer
          frequency: "2441Hz"
      - output.set_level:
          id: buzzer
          level: "75%"
    turn_off_action:
      - output.turn_off: buzzer
#   - platform: ble_client
#     ble_client_id: ble_client_${blueriiot_id_prefix}
#     name: "${blueriiot_name_prefix} Enable"
#     id: switch_${blueriiot_id_prefix}_enable    
# Outputs
output:
  - platform: ledc
    pin: GPIO21
    id: buzzer
  - platform: gpio
    pin: GPIO13
    id: lb2
  - platform: gpio
    pin: GPIO14
    id: lb1
  - platform: gpio
    pin: GPIO15
    id: lb4
  - platform: gpio
    pin: GPIO16
    id: lb3      
