   variant: WS2812x
   num_leds: 1
   id: rgb1
   method:
    type: esp32_rmt
    channel: 0
 - platform: binary
   name: "Led button 1"
   output: lb1
 - platform: binary
   name: "Led button 2"
   output: lb2
 - platform: binary
   name: "Led button 3"
   output: lb3
 - platform: binary
   name: "Led button 4"
   output: lb4
