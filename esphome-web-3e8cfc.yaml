# Pool Controller DJS
# Waveshare ESP32-S3-Relay-6CH
# ---------------------------------------------------------------------------
# DIAGNOSE-VERSIE (crash uitsluiten)
#  - BLE / esp32_improv VERWIJDERD (niet meer nodig; scheelt veel RAM)
#  - improv_serial behouden (serieel, kost vrijwel geen geheugen)
#  - Heap- en uptime-diagnostiek TOEGEVOEGD om geheugenlek te bevestigen/uitsluiten
#  - Functioneel verder identiek aan je originele config
# ---------------------------------------------------------------------------
# Pinout (Waveshare ESP32-S3-Relay-6CH):
#  GP0 BOOT | GP21 BUZZER | GP38 RGB | GP1..GP2/41/42/45/46 = CH1..CH6
#  GP17 TXD / GP18 RXD = RS485 | knoppen GP5/4/40/39 -> leds GP13/14/15/16
#  flow sensor = GPIO12 | I2C sda=8 scl=10

substitutions:
  name: esphome-web-3e8cfc
  friendly_name: Waveshare Relay RS485

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
  project:
    name: esphome.web
    version: '1.0'

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
    # Overweeg na deze test esp-idf voor lager RAM-gebruik / meer stabiliteit:
    # type: esp-idf

# Enable logging
logger:
  # Zet tijdelijk op DEBUG als je de crash-backtrace live wilt zien in de logs:
  # level: DEBUG

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  platform: esphome

# Provisioning via serieel (USB) - lichtgewicht, GEEN BLE
improv_serial:

wifi:
  ap: {}
  manual_ip:
    static_ip: 192.168.1.47
    gateway: 192.168.1.1
    subnet: 255.255.255.0

captive_portal:

dashboard_import:
  package_import_url: github://esphome/firmware/esphome-web/esp32s3.yaml@v2
  import_full_config: true

# --- BLE / improv-over-BLE VERWIJDERD ---
# esp32_improv:        # <- weg: hield de BLE-stack in de lucht (geheugen)
#   authorizer: none

# web_server kost ook RAM. Laat hem voorlopig staan; als de crash blijft,
# is dit de volgende kandidaat om uit te zetten.
web_server:

# ---------------------------------------------------------------------------
# DIAGNOSTIEK: vrij geheugen + uptime volgen over de uren
# ---------------------------------------------------------------------------
debug:
  update_interval: 30s

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"   # toont WAAROM de ESP herstartte na een crash

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp on/off"
    on_press:
      then:
        - switch.toggle: RL1
  - platform: gpio
    pin:
      number: GPIO4
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp low speed"
    on_press:
      then:
        - switch.turn_on: RL2
        - switch.turn_off: RL3
        - switch.turn_off: RL4
  - platform: gpio
    pin:
      number: GPIO40
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp med speed"
    on_press:
      then:
        - switch.turn_on: RL3
        - switch.turn_off: RL2
        - switch.turn_off: RL4
  - platform: gpio
    pin:
      number: GPIO39
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    name: "Zwembadpomp high speed"
    on_press:
      then:
        - switch.turn_on: RL4
        - switch.turn_off: RL2
        - switch.turn_off: RL3
  - platform: gpio
    pin:
      number: GPIO12
      inverted: True
      mode:
        input: true
        pulldown: True
    name: "zwembad flow sensor"

# Switches and relays
switch:
  - platform: gpio
    pin: GPIO1
    name: "Pump Toggle"
    id: RL1
    on_turn_on:
      - output.turn_on: lb1
    on_turn_off:
      - output.turn_off: lb1
      - output.turn_off: lb2
      - output.turn_off: lb3
      - output.turn_off: lb4
  - platform: gpio
    pin: GPIO2
    name: "Pump High"
    id: RL2
    on_turn_on:
      - output.turn_on: lb2
      - output.turn_off: lb3
      - output.turn_off: lb4
  - platform: gpio
    pin: GPIO41
    name: "Pump Mid"
    id: RL3
    on_turn_on:
      - output.turn_on: lb3
      - output.turn_off: lb2
      - output.turn_off: lb4
  - platform: gpio
    pin: GPIO42
    name: "Pump Low"
    id: RL4
    on_turn_on:
      - output.turn_on: lb4
      - output.turn_off: lb2
      - output.turn_off: lb3
  - platform: template
    name: "switch_buzzer"
    optimistic: true
    turn_on_action:
      - output.turn_on: buzzer
      - output.ledc.set_frequency:
          id: buzzer
          frequency: "2441Hz"
      - output.set_level:
          id: buzzer
          level: "75%"
    turn_off_action:
      - output.turn_off: buzzer

# Outputs
output:
  - platform: ledc
    pin: GPIO21
    id: buzzer
  - platform: gpio
    pin: GPIO13
    id: lb2
  - platform: gpio
    pin: GPIO14
    id: lb1
  - platform: gpio
    pin: GPIO15
    id: lb4
  - platform: gpio
    pin: GPIO16
    id: lb3

# Status Leds
light:
  - platform: neopixelbus
    name: "RGB Light"
    pin: GPIO38
    type: RGB
    variant: WS2812x
    num_leds: 1
    id: rgb1
    method:
      type: esp32_rmt
      channel: 0
  - platform: binary
    name: "Led button 1"
    output: lb1
  - platform: binary
    name: "Led button 2"
    output: lb2
  - platform: binary
    name: "Led button 3"
    output: lb3
  - platform: binary
    name: "Led button 4"
    output: lb4
